<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Legendary Stakes — Ask Anything v0.0.2</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d1117;
    --bg2:         #141b24;
    --bg3:         #1c2530;
    --border:      #2a3545;
    --gold:        #c9963a;
    --gold-light:  #e8b84b;
    --gold-dim:    rgba(201,150,58,0.15);
    --gold-glow:   rgba(201,150,58,0.28);
    --text:        #e8e0d0;
    --text-dim:    #9aaa9a;
    --text-muted:  #5a6a5a;
    --user-bubble: #1a2a3a;
    --agent-bubble:#141b24;
    --green:       #4caf72;
  }

  html, body { height: 100%; overflow: hidden; max-width: 100%; }
  * { max-width: 100%; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 64px;
    background: var(--bg2);
    border-bottom: 2px solid var(--gold);
    flex-shrink: 0;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0; right: 0;
    height: 6px;
    background: linear-gradient(to bottom, rgba(201,150,58,0.12), transparent);
    pointer-events: none;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-lockup {
    display: flex;
    flex-direction: column;
  }

  .logo-wordmark {
    font-family: 'Oswald', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .logo-wordmark span {
    color: var(--gold-light);
  }

  .logo-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 400;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 7px rgba(76,175,114,0.6);
    animation: pulse-dot 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clear-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 3px;
    background: transparent;
    border: 1px solid rgba(201,150,58,0.4);
    color: var(--gold);
    cursor: pointer;
    transition: all 0.18s;
  }

  .clear-btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 36px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
    background: var(--bg);
    width: 100%;
    box-sizing: border-box;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 14px;
    animation: msg-in 0.28s ease-out both;
    max-width: 820px;
    width: 100%;
    align-self: center;
    min-width: 0;
    box-sizing: border-box;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user {
    flex-direction: row-reverse;
    justify-content: flex-start;
  }

  .msg-row.user .bubble { max-width: 560px; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .avatar.agent {
    background: var(--gold);
    color: #0d1117;
  }

  .avatar.user {
    background: var(--bg3);
    color: var(--gold);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 16px 20px;
    border-radius: 6px;
    line-height: 1.75;
    font-size: 1rem;
    max-width: 100%;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
    min-width: 0;
    font-weight: 300;
  }

  .bubble.agent {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
    color: var(--text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid #253545;
    border-top-right-radius: 2px;
    color: var(--text);
  }

  .bubble p { margin-bottom: 0.85em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: var(--gold-light); font-weight: 600; }
  .bubble em { color: var(--text-dim); font-style: italic; }

  /* Resource cards */
  .res-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  /* ── Base card ── */
  .res-card {
    border-radius: 5px;
    padding: 11px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    text-decoration: none;
    cursor: pointer;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    border: 1px solid var(--border);
    background: var(--bg3);
    border-left: 3px solid var(--border);
  }

  /* ── GUIDANCE cards (YouTube) — teal/blue, softer ── */
  .res-card.card-guidance {
    border-left: 3px solid #3a8fa8;
    background: rgba(58,143,168,0.07);
    border-color: rgba(58,143,168,0.3);
  }
  .res-card.card-guidance:hover {
    background: rgba(58,143,168,0.13);
    border-left-color: #5ab8d4;
    transform: translateX(2px);
    box-shadow: 0 2px 12px rgba(58,143,168,0.15);
  }
  .res-card.card-guidance .res-icon {
    background: rgba(58,143,168,0.15);
  }
  .res-card.card-guidance .res-icon svg { color: #5ab8d4; }
  .res-card.card-guidance .res-label { color: #5ab8d4; }
  .res-card.card-guidance .res-arrow { color: #5ab8d4; }

  /* ── ACTION — Sign Up — gold fill, most prominent ── */
  .res-card.card-signup {
    border: 1.5px solid var(--gold);
    border-left: 4px solid var(--gold-light);
    background: rgba(201,150,58,0.12);
  }
  .res-card.card-signup:hover {
    background: rgba(201,150,58,0.2);
    border-color: var(--gold-light);
    transform: translateX(2px);
    box-shadow: 0 2px 16px rgba(201,150,58,0.2);
  }
  .res-card.card-signup .res-icon {
    background: var(--gold);
    border-radius: 4px;
  }
  .res-card.card-signup .res-icon svg { color: #0d1117; }
  .res-card.card-signup .res-label { color: var(--gold-light); }
  .res-card.card-signup .res-arrow {
    color: var(--gold-light);
    font-size: 1rem;
  }
  .res-card.card-signup .res-title { font-weight: 600; color: #fff; }

  /* ── ACTION — Sire profile — silver/white, clean ── */
  .res-card.card-sire {
    border-left: 3px solid #8a9db5;
    background: rgba(138,157,181,0.06);
    border-color: rgba(138,157,181,0.25);
  }
  .res-card.card-sire:hover {
    background: rgba(138,157,181,0.12);
    border-left-color: #adc0d6;
    transform: translateX(2px);
    box-shadow: 0 2px 12px rgba(138,157,181,0.12);
  }
  .res-card.card-sire .res-icon {
    background: rgba(138,157,181,0.12);
  }
  .res-card.card-sire .res-icon svg { color: #adc0d6; }
  .res-card.card-sire .res-label { color: #adc0d6; }
  .res-card.card-sire .res-arrow { color: #adc0d6; }

  /* ── ACTION — Leaderboard/Results — silver/white, clean ── */
  .res-card.card-results {
    border-left: 3px solid #8a9db5;
    background: rgba(138,157,181,0.06);
    border-color: rgba(138,157,181,0.25);
  }
  .res-card.card-results:hover {
    background: rgba(138,157,181,0.12);
    border-left-color: #adc0d6;
    transform: translateX(2px);
    box-shadow: 0 2px 12px rgba(138,157,181,0.12);
  }
  .res-card.card-results .res-icon {
    background: rgba(138,157,181,0.12);
  }
  .res-card.card-results .res-icon svg { color: #adc0d6; }
  .res-card.card-results .res-label { color: #adc0d6; }
  .res-card.card-results .res-arrow { color: #adc0d6; }

  /* ── ACTION — General web ── */
  .res-card.card-web {
    border-left: 3px solid var(--gold);
    background: var(--bg3);
  }
  .res-card.card-web:hover {
    border-left-color: var(--gold-light);
    background: rgba(201,150,58,0.07);
    transform: translateX(2px);
  }
  .res-card.card-web .res-icon { background: var(--gold-dim); }
  .res-card.card-web .res-icon svg { color: var(--gold); }
  .res-card.card-web .res-label { color: var(--gold); }
  .res-card.card-web .res-arrow { color: var(--gold); }

  .res-icon {
    width: 32px;
    height: 32px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .res-icon svg { width: 15px; height: 15px; }

  .res-info { flex: 1; min-width: 0; }

  .res-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .res-title {
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .res-url {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 3px;
  }

  .res-arrow {
    font-size: 0.78rem;
    flex-shrink: 0;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  /* Typing */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    border-top-left-radius: 2px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.5;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    padding: 16px 24px 18px;
    background: var(--bg2);
    border-top: 2px solid var(--gold);
    flex-shrink: 0;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }

  .input-wrap {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #2a3a4a;
    border: 1.5px solid rgba(201,150,58,0.5);
    border-radius: 6px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.97rem;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    max-height: 130px;
    overflow-y: auto;
  }

  textarea::placeholder { color: rgba(232,224,208,0.45); font-style: italic; }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }

  .send-btn {
    background: var(--gold);
    border: none;
    border-radius: 4px;
    width: 38px;
    height: 38px;
    min-width: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    margin-bottom: 1px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 14px var(--gold-glow); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  .send-btn svg { width: 16px; height: 16px; color: #0d1117; }

  .input-footer {
    max-width: 820px;
    margin: 9px auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .input-hint {
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  .char-count {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: 'Oswald', sans-serif;
  }

  /* Suggestions */
  .suggestions {
    max-width: 820px;
    margin: 0 auto 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sug-btn {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.82rem;
    font-weight: 300;
    font-style: italic;
    padding: 7px 15px;
    border-radius: 3px;
    background: rgba(201,150,58,0.08);
    border: 1px solid rgba(201,150,58,0.3);
    color: rgba(232,224,208,0.75);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    touch-action: manipulation;
  }

  .sug-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: var(--gold-dim);
  }

  /* Error */
  .error-note {
    font-size: 0.82rem;
    color: #e8694a;
    padding: 10px 15px;
    background: rgba(232,105,74,0.08);
    border: 1px solid rgba(232,105,74,0.22);
    border-radius: 5px;
    margin-top: 10px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.03em;
  }

  /* KEY GATE */
    position: fixed;
    inset: 0;
    background: rgba(8,10,14,0.94);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 0 14px; height: 56px; }
    .logo-wordmark { font-size: 1.1rem; }
    .logo-sub { font-size: 0.55rem; }
    .status-pill span { display: none; }
    .clear-btn { font-size: 0.6rem; padding: 4px 10px; }
    #messages { padding: 16px 12px; gap: 16px; }
    .msg-row { gap: 9px; max-width: 100%; }
    .msg-row.user .bubble { max-width: 86%; }
    .bubble { padding: 12px 14px; font-size: 0.92rem; line-height: 1.65; }
    .avatar { width: 28px; height: 28px; font-size: 0.62rem; }
    .input-area { padding: 10px 12px 12px; }
    .input-wrap { padding: 9px 11px; border-radius: 5px; gap: 8px; }
    textarea { font-size: 0.9rem; min-height: 20px; }
    .send-btn { width: 34px; height: 34px; min-width: 34px; }
    .send-btn svg { width: 14px; height: 14px; }
    .suggestions { gap: 6px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 1fr; }
    .sug-btn { font-size: 0.75rem; padding: 8px 10px; white-space: normal; text-align: center; line-height: 1.3; }
    .key-card { padding: 28px 24px; }
    .key-title { font-size: 1.35rem; }
  }

  @media (max-width: 380px) {
    .logo-wordmark { font-size: 0.95rem; }
    .bubble { font-size: 0.86rem; }
    .sug-btn { font-size: 0.7rem; }
  }
</style>
</head>
<body>


<header>
  <div class="header-left">
    <div class="logo-lockup">
      <div class="logo-wordmark">Legendary <span>Stakes</span></div>
      <div class="logo-sub">Western Performance Horse Platform</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot"></div>
      <span>Available</span>
    </div>
    <button class="clear-btn" onclick="clearConversation()">New Chat</button>
  </div>
</header>

<div id="messages"></div>

<div class="input-area">
  <div class="suggestions" id="suggestions"></div>
  <div class="input-wrap">
    <textarea id="input" placeholder="Select a topic above or ask me anything you like right here..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-footer">
    <span class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; v0.1.3</span>
    <span class="char-count" id="charCount"></span>
  </div>
  <div id="errorNote" class="error-note" style="display:none;"></div>
</div>

<script>
// ─── SYSTEM PROMPT ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the Legendary Stakes AI Assistant — a knowledgeable, plain-spoken guide for the Legendary Stakes western performance horse incentive platform.

## FOUNDERS
Legendary Stakes was founded by Shane Plummer and Logan Alley — two ranch owners with deep roots in the western performance horse industry.

### Shane Plummer
Shane is co-founder of Legendary Stakes and owner of SDP Buffalo Ranch in Texas. He comes from a horse industry family with generational roots in the stallion business. His parents stood racing stallions commercially in Utah and Idaho before moving to California, where they built a leading quarter horse racing operation and led the nation in winners from 1988 to 1992. They also operated the first private commercial embryo transfer business in the world. His parents' best-known acquisition was 1998 Kentucky Derby winner Real Quiet.

Shane and his wife purchased the family business in 2008, operating as SDP Buffalo Ranch (legal entity: Legacy Stud LLC). He has personally overseen more than 100 stallions across his career and describes the stallion business as his wheelhouse. His family entered the western performance horse world in 2001 after his father experienced cutting horses in Oklahoma — and the rest, as Shane puts it, is history.

He relocated the family business to Texas to focus specifically on performance sires, which ultimately led to the creation of the Legendary Stakes platform. Shane's vision for Legendary Stakes is to "decentralize and democratize the industry, making it more accessible and engaging for every stakeholder, from riders to breeders, dam and stallion owners."

Note: Sannman, the top-performing sire in the Legendary Stakes 2025 season and the 2026 leaderboard, is owned by SDP Buffalo Ranch — Shane's operation.

### Logan Alley
Logan Alley is co-founder of Legendary Stakes and owner of Sandance Equine. He shares Shane's deep respect for western heritage and the competitive disciplines that define it. Logan's focus in building Legendary Stakes was on connectivity — creating a platform that unites diverse competitors, events, and disciplines that had never been brought together under one umbrella before. In his own words: "Our vision is clear: to offer a fresh perspective that integrates competition, enjoyment, and earning potential through an advanced technology platform."

### Why They Built It
Legendary Stakes launched officially on May 1, 2024. The founders built it around a genuine frustration with how the industry worked — good people competing hard, with breeders, dam owners, and stallion owners getting little or no financial recognition for their role in a horse's success. They wanted to change that by creating a platform where every run at every event creates value for the entire chain — rider, owner, breeder, dam owner, and sire owner — simultaneously. The goal from day one was to build the largest annual purse in western performance horse history.

## WHO YOU'RE TALKING TO
Your primary audience is busy ranchers and horse people, many of them 60 or older, who value straightforward answers over long explanations. They don't need to be impressed — they need to be helped. Some are technology-comfortable, many are not. If someone seems confused or frustrated, slow down, be warm, and give them one clear step at a time.

## YOUR VOICE & TONE
- Plain-spoken and direct. Talk like a trusted friend in the industry, not a salesperson.
- Warm and patient, especially when someone is struggling.
- Encouraging but honest. Don't oversell.
- Short answers first. Offer to go deeper if they want more.

## WHAT LEGENDARY STAKES IS
Legendary Stakes is a technology-driven incentive and stakes platform built for the Western Performance Horse industry. It "piggybacks" on top of existing horse shows and events — it does NOT host its own events. Competitors enter their regular horse shows, then pay a separate $250 Legendary Stakes entry fee to activate that run for the Legendary Purse.

Key facts:
- 14 western disciplines covered: Barrel Racing, Breakaway Roping, Reined Cow Horse, Cutting, Heading, Heeling, Ranch Horse, Ranch Rodeo, Reining, Steer Wrestling, Tie-Down Roping, Western Pleasure, Pole Bending, and Sorting.
- 700+ events annually (roughly 50 per discipline).
- Entry fee: $250 per Legendary Stakes entry.
- 5 competing participant categories: Horse Owner, Rider, Dam Owner, Breeder, Sire Owner.
- All payouts happen at year-end following an audit.
- Real-time leaderboard available through the platform dashboard.
- Free lifetime enrollment for horses sired by an enrolled Legendary Stallion.
- As of 2026: 473 total enrolled sires, projected purse of $300,000.
- IMPORTANT: The sire directory on the website has a "Show Active Only" filter. When checked, it shows 88 sires that currently have active competing offspring. When unchecked, it shows all 473 enrolled sires. If someone says they heard "nearly 500 sires enrolled," that is correct. If someone asks how many sires are in the program, the answer is 473. A sire does not need to be actively competing to have its offspring eligible — enrollment and discipline unlocks are lifetime, so all offspring of all 473 enrolled sires remain eligible forever.

## THE ROYALTY SYSTEM
Every $250 entry fee is split as follows:
- Sire Owner: 10% ($25 per entry)
- Breeder: 10% ($25 per entry)
- Dam Owner: 10% ($25 per entry)
- Remainder goes into the Legendary Purse (prize pool)

Royalties are paid automatically. You earn them whether or not your horse wins.

## SIRE ENROLLMENT & COSTS
- Sire enrollment fee: $25,000 one-time, lifetime — no annual renewals ever.
- Financing available: $0 down with 0% interest, paid through offspring royalties.
- Unlocking a discipline: $15,000 per discipline, also one-time for life.
- Bonus: Unlock one discipline, get a second discipline free.
- Discipline financing: $5,000 down, remaining $10,000 paid through royalties.
- Once enrolled and a discipline is unlocked, that stallion's offspring can compete in all 50 events in that discipline every single year, forever.

## THE POINTS SYSTEM
At any single event, a horse can earn up to 10 points:
- Entry/Attendance: 4 points just for competing.
- Top Offspring of Sire: 3 points for placing highest among all offspring of your sire in the division.
- Best of the Best: 2 points for placing highest among ALL Legendary Stakes entries in the division.
- Champion Bonus: 1 additional point for winning the overall event.
Points are tracked across all 5 participant categories (Owner, Rider, Dam Owner, Breeder, Sire). Year-end leaderboard rankings determine annual payout amounts.

## HOW TO PARTICIPATE
1. Horse's sire must be enrolled in Legendary Stakes.
2. Create a free account at https://app.legendarystakes.com/signup — it's free and takes just a minute.
3. Enter your regular horse show as normal.
4. Also enter the same run via the Legendary Stakes app or website for $250.
5. Compete. Your Legendary Stakes points and purse earnings accumulate through the year.
6. Year-end payouts are distributed after audit.

// Normalize for fuzzy matching — uppercase, strip extra spaces
function normalizeSireName(s) {
  return s.toUpperCase().replace(/\s+/g, ' ').trim();
}

// Find a sire by exact or close match, returns { name, url } or null
function findSire(query) {
  const q = normalizeSireName(query);
  // Exact match first
  for (const [name, url] of Object.entries(SIRE_DATA)) {
    if (normalizeSireName(name) === q) return { name, url };
  }
  // Partial match — name contains query or query contains name
  for (const [name, url] of Object.entries(SIRE_DATA)) {
    const n = normalizeSireName(name);
    if (n.includes(q) || q.includes(n)) return { name, url };
  }
  return null;
}

// Scan agent reply text for enrolled sire names and return first match found
function detectSireInText(text) {
  const upper = text.toUpperCase();
  for (const [name, url] of Object.entries(SIRE_DATA)) {
    if (upper.includes(normalizeSireName(name))) return { name, url };
  }
  return null;
}

const RESOURCE_ICONS = {

// Classify a resource card type based on url and declared type
function getCardClass(type, url) {
  if (type === 'youtube') return 'card-guidance';
  if (url && url.includes('signup')) return 'card-signup';
  if (url && (url.includes('leaderboard') || url.includes('results'))) return 'card-results';
  if (url && url.includes('/sires/')) return 'card-sire';
  return 'card-web';
}

function getCardIcon(type, url) {
  if (type === 'youtube') return RESOURCE_ICONS.youtube;
  if (url && url.includes('signup')) return RESOURCE_ICONS.signup;
  if (url && (url.includes('leaderboard') || url.includes('results'))) return RESOURCE_ICONS.results;
  if (url && url.includes('/sires/')) return RESOURCE_ICONS.sire;
  return RESOURCE_ICONS.web;
}

function getCardLabel(type, url) {
  if (type === 'youtube') return 'Watch on YouTube';
  if (url && url.includes('signup')) return 'Join Free — Create Account';
  if (url && (url.includes('leaderboard') || url.includes('results'))) return 'View Results & Leaderboard';
  if (url && url.includes('/sires/')) return 'View Sire Profile';
  return 'Visit Website';
}

const SUGGESTIONS = [
  "What is Legendary Stakes?",
  "How do I create an account?",
  "How do I enroll a horse?",
  "How do I enter an event?"
];



let conversation = [];
let isLoading = false;

const messagesEl    = document.getElementById('messages');
const inputEl       = document.getElementById('input');
const sendBtn       = document.getElementById('sendBtn');
const suggestionsEl = document.getElementById('suggestions');
const errorNote     = document.getElementById('errorNote');
const charCount     = document.getElementById('charCount');

// ─── BUILD SUGGESTIONS ────────────────────────────────────────────────────────
SUGGESTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sug-btn';
  btn.textContent = s;
  btn.onclick = () => {
    inputEl.value = s;
    autoResize();
    suggestionsEl.style.display = 'none';
    sendMessage();
  };
  suggestionsEl.appendChild(btn);
});

// ─── GREETING ─────────────────────────────────────────────────────────────────
const GREETING = `Welcome to Legendary Stakes! We offer a new way to earn in Western Performance horse competitions, nationwide.\n\nWhether you're an owner, a breeder, a competitor, or just hearing about us for the first time, ask away — how can I help you today?`;

setTimeout(() => {
  addMessage('agent', GREETING);
  conversation.push({ role: 'assistant', content: GREETING });
}, 300);

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  autoResize();
  const len = inputEl.value.length;
  sendBtn.disabled = len === 0;
  charCount.textContent = len > 1800 ? `${len}/2000` : '';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled && !isLoading) sendMessage();
  }
});

sendBtn.addEventListener('click', () => { if (!isLoading) sendMessage(); });

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function parseMarkdown(text) {
  // Linkify bare URLs before other processing
  // Matches http/https URLs not already inside an HTML tag or markdown
  const linkified = text.replace(
    /(?<![">])(https?:\/\/[^\s<>"'\)\]]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:var(--gold-light);text-decoration:underline;text-underline-offset:2px;">$1</a>'
  );
  return linkified
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function extractResources(text) {
  const resources = [];
  const regex = /\[RESOURCE\|(\w+)\|([^\|]+)\|([^\]]+)\]/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    resources.push({ type: match[1], title: match[2], url: match[3] });
  }
  return resources;
}

function stripResourceTags(text) {
  return text.replace(/\[RESOURCE\|[^\]]+\]/g, '').trim();
}

function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'agent' ? 'LS' : 'You';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  const cleanText = role === 'agent' ? stripResourceTags(text) : text;
  bubble.innerHTML = `<p>${parseMarkdown(cleanText)}</p>`;

  if (role === 'agent') {
    const cardsDiv = document.createElement('div');
    cardsDiv.className = 'res-cards';
    let hasCards = false;

    // Explicit resource tags from the AI ([RESOURCE|type|title|url])
    const resources = extractResources(text);
    resources.forEach(res => {
      const card = document.createElement('a');
      const cardClass = getCardClass(res.type, res.url);
      card.className = `res-card ${cardClass}`;
      card.href = res.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      const label = getCardLabel(res.type, res.url);
      const icon = getCardIcon(res.type, res.url);
      const cardTitle = res.type === 'youtube' ? (getVideoTitle(res.url) || res.title) : res.title;
      const displayUrl = res.url.replace(/^https?:\/\//, '');
      card.innerHTML = `
        <div class="res-icon">${icon}</div>
        <div class="res-info">
          <div class="res-label">${label}</div>
          <div class="res-title">${cardTitle}</div>
          <div class="res-url">${displayUrl}</div>
        </div>
        <div class="res-arrow">→</div>`;
      cardsDiv.appendChild(card);
      hasCards = true;
    });

    // Auto-detect enrolled sire names in the reply and surface a profile card
    const sireMatch = detectSireInText(cleanText);
    if (sireMatch) {
      const sireCard = document.createElement('a');
      sireCard.className = 'res-card card-sire';
      sireCard.href = sireMatch.url;
      sireCard.target = '_blank';
      sireCard.rel = 'noopener noreferrer';
      const displaySireUrl = sireMatch.url.replace(/^https?:\/\//, '');
      sireCard.innerHTML = `
        <div class="res-icon">${RESOURCE_ICONS.sire}</div>
        <div class="res-info">
          <div class="res-label">View Sire Profile</div>
          <div class="res-title">${sireMatch.name}</div>
          <div class="res-url">${displaySireUrl}</div>
        </div>
        <div class="res-arrow">→</div>`;
      cardsDiv.appendChild(sireCard);
      hasCards = true;
    }

    if (hasCards) bubble.appendChild(cardsDiv);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar agent';
  avatar.textContent = 'LS';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── CLEAR ────────────────────────────────────────────────────────────────────
function clearConversation() {
  conversation = [];
  messagesEl.innerHTML = '';
  suggestionsEl.style.display = 'flex';
  errorNote.style.display = 'none';
  setTimeout(() => {
    addMessage('agent', GREETING);
    conversation.push({ role: 'assistant', content: GREETING });
  }, 180);
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  suggestionsEl.style.display = 'none';
  errorNote.style.display = 'none';

  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  charCount.textContent = '';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  isLoading = true;
  addTyping();

  try {
    const response = await fetch('https://cold-bird-2890.jsasse-5c6.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || "Something went wrong on my end — please try again in a moment.";

    addMessage('agent', reply);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    console.error('Legendary Stakes AI error:', err);
    errorNote.textContent = `Something went wrong: ${err.message}. Check your connection and try again.`;
    errorNote.style.display = 'block';
    conversation.pop();
  }

  isLoading = false;
  if (!('ontouchstart' in window)) {
    inputEl.focus();
  }
}
</script>
